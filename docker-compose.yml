services:
  db:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: hilpo
      POSTGRES_USER: hilpo
      POSTGRES_PASSWORD: hilpo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hilpo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
