[project]
name = "hilpo"
version = "0.1.0"
description = "HILPO — Human-In-the-Loop Prompt Optimization engine"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.82.0",
    "pydantic>=2.11.0",
    "psycopg[binary]>=3.3.3",
    "google-cloud-storage>=3.10.0",
    "google-auth>=2.49.0",
    "python-dotenv>=1.2.0",
]

[tool.setuptools.packages.find]
include = ["hilpo*"]

[project.optional-dependencies]
eval = [
    "scikit-learn>=1.6.0",
    "numpy>=2.0.0",
]
